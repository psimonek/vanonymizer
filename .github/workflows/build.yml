name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------- LINUX SYSTEM LIBS ----------------

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libxcb1

      # ---------------- PYTHON DEPENDENCIES ----------------

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------------- FORCE CPU TORCH ----------------

      - name: Force CPU torch on Linux
        if: runner.os == 'Linux'
        run: |
          pip uninstall -y torch torchvision
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Show installed packages
        run: pip list

      - name: Prepare bin directory
        run: mkdir -p bin

      # ---------------- MAC ----------------

      - name: Download FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p bin/mac
          curl -L https://www.osxexperts.net/ffmpeg7arm.zip -o ffmpeg.zip
          unzip ffmpeg.zip
          mv ffmpeg bin/mac/ffmpeg
          chmod +x bin/mac/ffmpeg

      # ---------------- LINUX ----------------

      - name: Download FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p bin/linux
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          mv ffmpeg-*-static/ffmpeg bin/linux/
          chmod +x bin/linux/ffmpeg

      # ---------------- WINDOWS ----------------

      - name: Download FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir bin/windows
          Invoke-WebRequest https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $dir = Get-ChildItem -Directory | Where-Object { $_.Name -like "ffmpeg*" } | Select-Object -First 1
          Copy-Item "$($dir.FullName)\bin\ffmpeg.exe" "bin/windows\ffmpeg.exe"

      # ---------------- BUILD ----------------

      - name: Build with PyInstaller
        run: pyinstaller vanonymizer.spec

      # ---------------- TEST CLI ----------------

      - name: Test binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/vanonymizer/vanonymizer || true
          ./dist/vanonymizer/vanonymizer --help

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & ".\dist\vanonymizer\vanonymizer.exe" --help

      # ---------------- TEST FUNKČNOSTI ----------------

      - name: Run anonymization test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ./dist/vanonymizer/vanonymizer test/assets/test_faces.mp4 out_mac_lin.mp4

      - name: Run anonymization test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & ".\dist\vanonymizer\vanonymizer.exe" test/assets/test_faces.mp4 out_win.mp4

      - name: Verify output video
        if: runner.os != 'Windows'
        run: |
          test -s out_mac_lin.mp4

      - name: Verify output video (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path out_win.mp4)) { exit 1 }

      # ---------------- PACKAGE ----------------

      - name: Package binary
        run: |
          python -c "import shutil, os; p='dist/vanonymizer' if os.path.exists('dist/vanonymizer') else 'dist'; shutil.make_archive('vanonymizer-${{ runner.os }}','zip',p)"

      # ---------------- ARTIFACT ----------------

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanonymizer-${{ runner.os }}
          path: vanonymizer-${{ runner.os }}.zip


  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*.zip
